services:
  - type: web
    name: ai-chat-backend
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: google/gemma-4-31b-it:free
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAMESITE
        value: "lax"
      - key: MAX_MESSAGES_IN_CONTEXT
        value: "20"
      # ВАЖНО: замените origin на ваш Netlify домен после деплоя
      - key: CORS_ORIGINS
        value: http://127.0.0.1:5500,https://ai-chat-1-9a9z.onrender.com
