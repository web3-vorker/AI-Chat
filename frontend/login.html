<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход - AI Chat</title>
    <meta name="color-scheme" content="dark" />
    <link rel="icon" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .auth-card {
        background: rgba(20, 20, 30, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 2rem;
        max-width: 400px;
        width: 100%;
        backdrop-filter: blur(10px);
      }
      .auth-card__title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
        text-align: center;
      }
      .auth-card__subtitle {
        color: rgba(255, 255, 255, 0.6);
        text-align: center;
        margin-bottom: 2rem;
      }
      .auth-form {
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      .auth-tabs {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }
      .auth-tab {
        flex: 1;
        padding: 0.75rem;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
        transition: all 0.2s;
      }
      .auth-tab:hover {
        border-color: rgba(255, 255, 255, 0.2);
        color: rgba(255, 255, 255, 0.8);
      }
      .auth-tab--active {
        background: rgba(99, 102, 241, 0.2);
        border-color: rgb(99, 102, 241);
        color: white;
      }
      .auth-error {
        padding: 0.75rem;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 8px;
        color: rgb(252, 165, 165);
        font-size: 0.875rem;
        display: none;
      }
      .auth-error--visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="bg">
      <div class="bg__grid"></div>
      <div class="bg__glow bg__glow--a"></div>
      <div class="bg__glow bg__glow--b"></div>
    </div>

    <div class="auth-container">
      <div class="auth-card">
        <div class="brand" style="justify-content: center; margin-bottom: 2rem;">
          <div class="brand__logo" aria-hidden="true"></div>
          <div class="brand__text">
            <div class="brand__title">AI Chat</div>
            <div class="brand__sub">OpenRouter gateway</div>
          </div>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab auth-tab--active" id="loginTab" type="button">Вход</button>
          <button class="auth-tab" id="registerTab" type="button">Регистрация</button>
        </div>

        <div class="auth-error" id="authError"></div>

        <form class="auth-form" id="authForm">
          <div class="field">
            <label class="field__label" for="emailInput">Email</label>
            <input
              class="input"
              id="emailInput"
              type="email"
              placeholder="your@email.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="field">
            <label class="field__label" for="passwordInput">Пароль</label>
            <input
              class="input"
              id="passwordInput"
              type="password"
              placeholder="Минимум 8 символов"
              required
              autocomplete="current-password"
              minlength="8"
            />
          </div>

          <button class="btn btn--primary" id="submitBtn" type="submit">
            <span class="btn__text">Войти</span>
          </button>
        </form>
      </div>
    </div>

    <script src="/static/config.js"></script>
    <script src="/static/auth.js"></script>
  </body>
</html>
